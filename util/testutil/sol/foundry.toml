[profile.default]
src = "src"
out = "out"
solc = "0.8.30"
via_ir = true
optimizer = true
optimizer_runs = 200
# deterministic bytecode across forge/solc patches -- strip the CBOR metadata
# section so the generated .txt files don't drift when CI uses a different
# forge than whoever regenerated them locally.
bytecode_hash = "none"
cbor_metadata = false
